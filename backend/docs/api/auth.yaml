openapi: 3.0.3
info:
  title: Auth API
  description: Authentication and Account management.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AccountResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        username:
          type: string
        is_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - username
                - password
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                  minLength: 3
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: Account created successfully
  /auth/login:
    post:
      tags:
        - Authentication
      summary: Login to an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh Access Token
      responses:
        '200':
          description: Tokens refreshed successfully
  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current account details
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Account details retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AccountResponse'
  /auth/search:
    get:
      tags:
        - Authentication
      summary: Search accounts by username or email
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccountResponse'
